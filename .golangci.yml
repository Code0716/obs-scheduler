version: '2'
run:
  go: '1.25'
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - misspell
    - ineffassign
    - unused
    - gocyclo

linters-settings:
  gocyclo:
    min-complexity: 15
  goimports:
    local-prefixes:
      - obs-scheduler

issues:
  exclude-dirs:
    - internal/mock
  exclude-files:
    - cmd/obs-scheduler/wire_gen.go
