version: '2'
run:
  go: '1.25'
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - misspell
    - ineffassign
    - unused
    - gocyclo
  settings:
    gocyclo:
      min-complexity: 15
    goimports:
      local-prefixes:
        - obs-scheduler

issues:
  exclude-rules:
    - path: internal/mock/.*
      linters:
        - all
    - path: cmd/obs-scheduler/wire_gen.go
      linters:
        - all
